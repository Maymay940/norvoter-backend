version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: copy_norvoter_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: norvoter
      POSTGRES_USER: postgres2
      POSTGRES_PASSWORD: 1qaz
    ports:
      - "5433:5432"              # ← другой порт, чтобы не конфликтовать
    volumes:
      - copy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres2 -d norvoter"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: copy_norvoter_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"              # ← другой порт
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula

  minio:
    image: minio/minio:latest
    container_name: copy_norvoter_minio
    restart: unless-stopped
    ports:
      - "9002:9000"              # ← другой порт API
      - "9003:9001"              # ← другой порт консоли
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - copy_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build: .
    container_name: copy_norvoter_backend
    restart: unless-stopped
    ports:
      - "8001:8000"              # ← другой порт
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: norvoter
      DB_USER: postgres2
      DB_PASSWORD: 1qaz
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: meters
      MINIO_ENDPOINT: minio:9000
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ../norvoter-frontend
    container_name: copy_norvoter_frontend
    restart: unless-stopped
    ports:
      - "81:80"                  # ← другой порт
    depends_on:
      - backend

volumes:
  copy_postgres_data:
  copy_minio_data: